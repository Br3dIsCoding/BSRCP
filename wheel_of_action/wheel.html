<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bread Wheel</title>
<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #6b4423 0%, #4a2d16 60%, #2f1b0d 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#wheel-container {
  position: relative;
  width: 500px;
  height: 500px;
}

canvas {
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

#pointer {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-top: 40px solid #ff4444;
}

#spin-btn {
  position: absolute;
  bottom: -80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px 40px;
  font-size: 20px;
  border: none;
  border-radius: 30px;
  background: #ffcc66;
  color: #3a220f;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

#spin-btn:hover {
  transform: translateX(-50%) scale(1.1);
}

#result {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: rgba(0,0,0,0.8);
  color: #ffcc66;
  padding: 25px 40px;
  border-radius: 20px;
  font-size: 28px;
  font-weight: bold;
  text-align: center;
  transition: 0.4s ease;
  pointer-events: none;
}

#result.show {
  transform: translate(-50%, -50%) scale(1);
}
</style>
</head>
<body>

<div id="wheel-container">
  <div id="pointer"></div>
  <canvas id="wheel" width="500" height="500"></canvas>
  <div id="result"></div>
  <button id="spin-btn">SPIN THE WHEEL</button>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spin-btn");
const resultBox = document.getElementById("result");

const options = [
  "screen flip",
  "Hydrate Check",
  "no swearing",
  "Drop weapon",
  "Kill youself in game",
  "bakery sale!!",
  "Self care",
  "Chat chooses"
];

const colors = [
  "#ffcc66","#ff9966","#ffb347","#e67300",
  "#cc8400","#ffaa33","#ff944d","#ff7733"
];

let startAngle = 0;
let arc = Math.PI * 2 / options.length;
let spinTimeout = null;
let spinAngleStart = 0;
let spinTime = 0;
let spinTimeTotal = 0;

function addWheelOption(text, username) {

if (!text || text.trim() === "") return;

options.push(text + " (" + username + ")");
colors.push("#" + Math.floor(Math.random()*16777215).toString(16));
arc = Math.PI * 2 / options.length;

drawWheel();
}

let lastFileContent = "";

// Check local file every 1 second
setInterval(async () => {
  try {
    const response = await fetch("wheel.txt?t=" + Date.now());
    const text = await response.text();

    if (text !== lastFileContent && text.trim() !== "") {
      lastFileContent = text;

      const lines = text.trim().split("\n");
      const lastLine = lines[lines.length - 1];

      const parts = lastLine.split("|");
      const idea = parts[0];
      const username = parts[1];

      addWheelOption(idea, username);
    }

  } catch (err) {
    // ignore if file doesn't exist yet
    //shoudlnt happen since the file does exist
  }
}, 1000);

function drawWheel() {
  ctx.clearRect(0, 0, 500, 500);
  for (let i = 0; i < options.length; i++) {
    const angle = startAngle + i * arc;
    ctx.fillStyle = colors[i];

    ctx.beginPath();
    ctx.arc(250, 250, 250, angle, angle + arc);
    ctx.lineTo(250, 250);
    ctx.fill();

    ctx.save();
    ctx.translate(250, 250);
    ctx.rotate(angle + arc / 2);
    ctx.fillStyle = "#3a220f";
    ctx.font = "bold 18px Arial";
    ctx.textAlign = "right";
    ctx.fillText(options[i], 230, 10);
    ctx.restore();
  }
}

function easeOut(t, b, c, d) {
  let ts = (t/=d)*t;
  let tc = ts*t;
  return b+c*(tc + -3*ts + 3*t);
}

function rotateWheel() {
  spinTime += 30;
  if(spinTime >= spinTimeTotal) {
    stopRotateWheel();
    return;
  }
  const spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
  startAngle += (spinAngle * Math.PI / 180);
  drawWheel();
  spinTimeout = setTimeout(rotateWheel, 30);
}

function stopRotateWheel() {
  clearTimeout(spinTimeout);

  const degrees = startAngle * 180 / Math.PI + 90;
  const arcd = arc * 180 / Math.PI;
  const index = Math.floor((360 - degrees % 360) / arcd);

  const winner = options[index];

  resultBox.textContent = "🍞 " + winner;
  resultBox.classList.add("show");
}

spinBtn.addEventListener("click", () => {
  resultBox.classList.remove("show");
  spinAngleStart = Math.random() * 20 + 30;
  spinTime = 0;
  spinTimeTotal = Math.random() * 3000 + 4000;
  rotateWheel();
});

drawWheel();
</script>

</body>
</html>
